<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Main Hub | Portal Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at top left, #1e293b, #0f172a);
            background-attachment: fixed;
            min-height: 100vh;
            overflow-x: hidden;
            overflow-y: auto;
            color: white;
            padding: 20px 0;
            transition: opacity 0.4s ease;
        }

        .bg-glow {
            position: fixed;
            width: 300px;
            height: 300px;
            background: rgba(45, 212, 191, 0.1);
            filter: blur(80px);
            border-radius: 50%;
            z-index: -1;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .module-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            border-radius: 24px;
        }

        .module-card:active {
            transform: scale(0.95);
            background: rgba(45, 212, 191, 0.2);
        }

        @media (min-width: 1024px) {
            .module-card:hover {
                background: rgba(45, 212, 191, 0.1);
                border-color: #2dd4bf;
                transform: translateY(-5px);
            }
        }

        .hidden-section {
            display: none;
            opacity: 0;
            transform: translateY(20px);
        }

        .visible-section {
            display: block;
            animation: fadeIn 0.6s forwards ease-out;
        }

        @keyframes fadeIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .btn-shine {
            background: linear-gradient(90deg, #0d9488, #2dd4bf);
            transition: 0.3s;
        }
    </style>
    <link rel="manifest" href="manifest.json">
</head>
<body>
    <div class="bg-glow" style="top: -5%; left: -5%;"></div>
    <div class="bg-glow" style="bottom: -5%; right: -5%; background: rgba(234, 179, 8, 0.05);"></div>

    <div id="portal-section" class="w-full max-w-5xl px-6 visible-section">
        <div class="text-center mb-8">
            <h2 class="text-3xl sm:text-4xl font-black tracking-tighter mb-2 italic uppercase">
                Dashboard <span class="text-teal-400">Invest</span>
            </h2>
            <p class="text-gray-400 text-[10px] uppercase tracking-[0.2em]">Hệ thống quản trị tài chính</p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 sm:gap-6">

            <div onclick="navTo('chitieu.html')" class="module-card p-6 sm:p-8 flex flex-row sm:flex-col items-center gap-4 sm:text-center">
                <div class="w-12 h-12 sm:w-16 sm:h-16 bg-blue-500/20 text-blue-400 rounded-2xl flex items-center justify-center text-xl sm:text-2xl shrink-0">
                    <i class="fas fa-wallet"></i>
                </div>
                <div>
                    <h3 class="font-black text-xs sm:text-sm uppercase tracking-wide">Chi tiêu</h3>
                    <p class="text-gray-500 text-[9px] sm:text-[10px] mt-1">Dòng tiền & Tăng ca</p>
                </div>
            </div>

            <div onclick="navTo('1.html')" class="module-card p-6 sm:p-8 flex flex-row sm:flex-col items-center gap-4 sm:text-center">
                <div class="w-12 h-12 sm:w-16 sm:h-16 bg-emerald-500/20 text-emerald-400 rounded-2xl flex items-center justify-center text-xl sm:text-2xl shrink-0">
                    <i class="fas fa-chart-line"></i>
                </div>
                <div>
                    <h3 class="font-black text-xs sm:text-sm uppercase tracking-wide">Chứng khoán</h3>
                    <p class="text-gray-500 text-[9px] sm:text-[10px] mt-1">Cổ phiếu & Lợi nhuận</p>
                </div>
            </div>

            <div onclick="navTo('2.html')" class="module-card p-6 sm:p-8 flex flex-row sm:flex-col items-center gap-4 sm:text-center">
                <div class="w-12 h-12 sm:w-16 sm:h-16 bg-yellow-500/20 text-yellow-400 rounded-2xl flex items-center justify-center text-xl sm:text-2xl shrink-0">
                    <i class="fas fa-coins"></i>
                </div>
                <div>
                    <h3 class="font-black text-xs sm:text-sm uppercase tracking-wide">Vàng & Tỷ giá</h3>
                    <p class="text-gray-500 text-[9px] sm:text-[10px] mt-1">Ngoại tệ & Kim loại</p>
                </div>
            </div>

            <div onclick="navTo('3.html')" class="module-card p-6 sm:p-8 flex flex-row sm:flex-col items-center gap-4 sm:text-center">
                <div class="w-12 h-12 sm:w-16 sm:h-16 bg-purple-500/20 text-purple-400 rounded-2xl flex items-center justify-center text-xl sm:text-2xl shrink-0">
                    <i class="fas fa-landmark"></i>
                </div>
                <div>
                    <h3 class="font-black text-xs sm:text-sm uppercase tracking-wide">Bất động sản</h3>
                    <p class="text-gray-500 text-[9px] sm:text-[10px] mt-1">Đất đai & Nhà thuê</p>
                </div>
            </div>

            <div onclick="navTo('4.html')" class="module-card p-6 sm:p-8 flex flex-row sm:flex-col items-center gap-4 sm:text-center">
                <div class="w-12 h-12 sm:w-16 sm:h-16 bg-pink-500/20 text-pink-400 rounded-2xl flex items-center justify-center text-xl sm:text-2xl shrink-0">
                    <i class="fas fa-piggy-bank"></i>
                </div>
                <div>
                    <h3 class="font-black text-xs sm:text-sm uppercase tracking-wide">Quỹ dự phòng</h3>
                    <p class="text-gray-500 text-[9px] sm:text-[10px] mt-1">Tiền mặt tiết kiệm</p>
                </div>
            </div>

            <div class="module-card p-6 sm:p-8 flex flex-row sm:flex-col items-center gap-4 sm:text-center opacity-40 cursor-not-allowed">
                <div class="w-12 h-12 sm:w-16 sm:h-16 bg-gray-500/20 text-gray-400 rounded-2xl flex items-center justify-center text-xl sm:text-2xl shrink-0">
                    <i class="fas fa-plus"></i>
                </div>
                <div>
                    <h3 class="font-black text-xs sm:text-sm uppercase tracking-wide">Thêm mới</h3>
                    <p class="text-gray-500 text-[9px] sm:text-[10px] mt-1">Mở rộng đầu tư</p>
                </div>
            </div>
        </div>

        <div class="text-center mt-10 mb-10">
            <button onclick="logout()" class="bg-white/5 px-6 py-3 rounded-full text-gray-400 hover:text-white text-[10px] font-bold uppercase tracking-[0.2em] transition border border-white/10">
                <i class="fas fa-power-off mr-2"></i> Khóa phiên
            </button>
        </div>
    </div>

    <script>
        if (sessionStorage.getItem('portal_authenticated') !== 'true') {
            window.location.href = 'index.html';
        }

        function navTo(url) {
            document.body.style.opacity = "0";
            document.body.style.transition = "0.4s";
            setTimeout(() => {
                window.location.href = url;
            }, 400);
        }

        function logout() {
            sessionStorage.removeItem('portal_authenticated');
            document.body.style.opacity = "0";
            setTimeout(() => {
                window.location.href = 'index.html';
            }, 400);
        }
    </script>
</body>
</html>
