<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Đăng nhập | Portal Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at top left, #1e293b, #0f172a);
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            overflow-y: auto;
            color: white;
            padding: 20px 0;
            transition: opacity 0.4s ease;
        }

        .bg-glow {
            position: fixed;
            width: 300px;
            height: 300px;
            background: rgba(45, 212, 191, 0.1);
            filter: blur(80px);
            border-radius: 50%;
            z-index: -1;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .btn-shine {
            background: linear-gradient(90deg, #0d9488, #2dd4bf);
            transition: 0.3s;
        }
    </style>
    <link rel="manifest" href="manifest.json">
</head>
<body>
    <div class="bg-glow" style="top: -5%; left: -5%;"></div>
    <div class="bg-glow" style="bottom: -5%; right: -5%; background: rgba(234, 179, 8, 0.05);"></div>

    <div id="login-section" class="glass-card w-full max-w-[90%] sm:max-w-md p-8 sm:p-10 mx-4 transition-all duration-500">
        <div class="text-center mb-8">
            <div class="w-16 h-16 bg-teal-500 rounded-2xl mx-auto mb-4 flex items-center justify-center shadow-lg shadow-teal-500/50 rotate-12">
                <i class="fas fa-lock text-2xl text-white -rotate-12"></i>
            </div>
            <h1 class="text-xl sm:text-2xl font-black tracking-tighter uppercase">
                Phòng điều khiển <span class="text-teal-400 text-xs">V1.0</span>
            </h1>
            <p class="text-gray-400 text-[9px] uppercase tracking-widest mt-1">Xác thực quyền truy cập</p>
        </div>

        <form id="loginForm" class="space-y-6">
            <div class="space-y-4">
                <input
                    type="password"
                    id="password"
                    inputmode="numeric"
                    placeholder="••••••"
                    class="w-full px-4 py-4 rounded-2xl bg-white/5 border border-white/10 outline-none focus:border-teal-400 transition text-center tracking-[0.5em] font-black text-white"
                >
            </div>

            <button
                type="submit"
                class="w-full btn-shine py-4 rounded-2xl font-black text-xs uppercase tracking-[0.2em] shadow-lg shadow-teal-500/20"
            >
                Mở khóa hệ thống
            </button>
        </form>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const pass = document.getElementById('password').value;

            if (pass === "123") {
                const loginSection = document.getElementById('login-section');

                loginSection.style.opacity = "0";
                loginSection.style.transform = "translateY(-20px)";

                setTimeout(() => {
                    sessionStorage.setItem('portal_authenticated', 'true');
                    window.location.href = 'main.html';
                }, 400);
            } else {
                alert("Mật mã sai!");
                document.getElementById('password').value = "";
            }
        });
    </script>
</body>
</html>
