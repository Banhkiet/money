<head>

        .gold-widget-container {
            width: 100%;

            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            font-family: Arial, sans-serif;
        }
        .widget-header {
            background-color: #d4af37;
            color: white;
            padding: 10px;
            text-align: center;
            font-weight: bold;
        }
    </style>
</head>

    <div class="gold-widget-container">
        <div class="widget-header">GIÁ VÀNG PHÚ QUÝ - CHI NHÁNH TP.HCM</div>
        
        <!-- Nhúng Iframe từ nguồn Webgia (chuyên bóc tách dữ liệu Phú Quý) -->
        <iframe 
            src="https://webgia.com" 
            width="100%" 
            height="500" 
            frameborder="0" 
            scrolling="yes"
            style="border:none;">
        </iframe>
        
        <div style="padding: 10px; font-size: 12px; color: #666; text-align: center;">
            Nguồn dữ liệu: Phuquygroup.vn - Cập nhật liên tục
        </div>
    </div>
